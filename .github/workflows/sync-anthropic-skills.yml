name: Sync Anthropic Official Skills

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨同步一次
  workflow_dispatch: # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Official Skills
        run: |
          mkdir -p temp_official
          git clone --depth 1 https://github.com/anthropics/skills.git temp_official
          mkdir -p skills/official
          # 清理旧的官方技能文件（排除 .git 等）
          rm -rf skills/official/*
          # 拷贝新内容，主要针对子目录（具体的技能文件夹）
          cp -r temp_official/* skills/official/
          rm -rf temp_official

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/official
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync official skills from anthropic" && git push)
